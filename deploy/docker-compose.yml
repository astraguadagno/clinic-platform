services:
  directory-db:
    image: postgres:17-alpine
    container_name: directory-db
    environment:
      POSTGRES_DB: directory
      POSTGRES_USER: directory
      POSTGRES_PASSWORD: directory
    ports:
      - "5433:5432"
    volumes:
      - directory-db-data:/var/lib/postgresql/data
      - ../services/directory-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directory -d directory"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  appointments-db:
    image: postgres:17-alpine
    container_name: appointments-db
    environment:
      POSTGRES_DB: appointments
      POSTGRES_USER: appointments
      POSTGRES_PASSWORD: appointments
    ports:
      - "5434:5432"
    volumes:
      - appointments-db-data:/var/lib/postgresql/data
      - ../services/appointments-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appointments -d appointments"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  appointments-db-migrator:
    image: postgres:17-alpine
    container_name: appointments-db-migrator
    environment:
      PGPASSWORD: appointments
    command:
      - sh
      - -ec
      - >-
        psql -h appointments-db -p 5432 -U appointments -d appointments
        -v ON_ERROR_STOP=1
        -f /migrations/002_prevent_availability_slot_overlaps.sql
    volumes:
      - ../services/appointments-service/migrations/002_prevent_availability_slot_overlaps.sql:/migrations/002_prevent_availability_slot_overlaps.sql:ro
    depends_on:
      appointments-db:
        condition: service_healthy

  directory-service:
    build:
      context: ../services/directory-service
    container_name: directory-service
    environment:
      PORT: 8081
      APP_ENV: docker
      DB_HOST: directory-db
      DB_PORT: 5432
      DB_NAME: directory
      DB_USER: directory
      DB_PASSWORD: directory
    ports:
      - "8081:8081"
    depends_on:
      directory-db:
        condition: service_healthy

  appointments-service:
    build:
      context: ../services/appointments-service
    container_name: appointments-service
    environment:
      PORT: 8082
      APP_ENV: docker
      DIRECTORY_SERVICE_BASE_URL: http://directory-service:8081
      DB_HOST: appointments-db
      DB_PORT: 5432
      DB_NAME: appointments
      DB_USER: appointments
      DB_PASSWORD: appointments
    ports:
      - "8082:8082"
    depends_on:
      appointments-db-migrator:
        condition: service_completed_successfully
      directory-service:
        condition: service_started

volumes:
  directory-db-data:
  appointments-db-data:
