openapi: 3.0.3
info:
  title: Directory Service API
  version: 0.1.0
  description: API for managing patients and professionals.

servers:
  - url: http://localhost:8081

paths:
  /health:
    get:
      summary: Service health check
      responses:
        '200':
          description: Healthy service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /info:
    get:
      summary: Service metadata
      responses:
        '200':
          description: Service info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  /auth/login:
    post:
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/AuthBadRequest'
        '401':
          $ref: '#/components/responses/AuthUnauthorized'
        '500':
          $ref: '#/components/responses/AuthInternalServerError'

  /auth/me:
    get:
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          $ref: '#/components/responses/AuthUnauthorized'
        '500':
          $ref: '#/components/responses/AuthMeInternalServerError'

  /patients:
    get:
      summary: List patients
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Patients listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '401':
          $ref: '#/components/responses/AuthUnauthorized'
        '403':
          $ref: '#/components/responses/RoleForbidden'
    post:
      summary: Create patient
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '201':
          description: Patient created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
              examples:
                created_patient:
                  value:
                    id: patient-1
                    first_name: Ada
                    last_name: Lovelace
                    document: '123'
                    birth_date: '1990-10-10'
                    phone: '555'
                    email: ada@example.com
                    active: true
                    created_at: '2026-04-06T12:00:00Z'
                    updated_at: '2026-04-06T12:00:00Z'
        '400':
          $ref: '#/components/responses/CreatePatientBadRequest'
        '401':
          $ref: '#/components/responses/AuthUnauthorized'
        '403':
          $ref: '#/components/responses/RoleForbidden'
        '500':
          $ref: '#/components/responses/CreatePatientInternalServerError'

  /patients/{id}:
    get:
      summary: Get patient by ID
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Patient found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
              examples:
                patient:
                  value:
                    id: patient-1
                    first_name: Ada
                    last_name: Lovelace
                    document: '123'
                    birth_date: '1990-10-10'
                    phone: '555'
                    email: ada@example.com
                    active: true
                    created_at: '2026-04-06T12:00:00Z'
                    updated_at: '2026-04-06T12:00:00Z'
        '404':
          $ref: '#/components/responses/PatientNotFound'
        '500':
          $ref: '#/components/responses/GetPatientInternalServerError'

  /patients/{id}/encounters:
    get:
      summary: List patient encounters for current professional
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Encounters listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncounterListResponse'
        '401':
          $ref: '#/components/responses/AuthUnauthorized'
        '403':
          $ref: '#/components/responses/ClinicalForbidden'
        '404':
          $ref: '#/components/responses/PatientNotFound'
        '500':
          $ref: '#/components/responses/ListEncountersInternalServerError'
    post:
      summary: Create patient encounter with initial clinical note
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEncounterRequest'
      responses:
        '201':
          description: Encounter created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        '400':
          $ref: '#/components/responses/CreateEncounterBadRequest'
        '401':
          $ref: '#/components/responses/AuthUnauthorized'
        '403':
          $ref: '#/components/responses/ClinicalForbidden'
        '404':
          $ref: '#/components/responses/PatientNotFound'
        '500':
          $ref: '#/components/responses/CreateEncounterInternalServerError'

  /professionals:
    get:
      summary: List professionals
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Professionals listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessionalListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '401':
          $ref: '#/components/responses/AuthUnauthorized'
        '403':
          $ref: '#/components/responses/RoleForbidden'
    post:
      summary: Create professional
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfessionalRequest'
      responses:
        '201':
          description: Professional created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Professional'
              examples:
                created_professional:
                  value:
                    id: pro-1
                    first_name: Ana
                    last_name: Lopez
                    specialty: cardiology
                    active: true
                    created_at: '2026-04-06T12:00:00Z'
                    updated_at: '2026-04-06T12:00:00Z'
        '400':
          $ref: '#/components/responses/CreateProfessionalBadRequest'
        '401':
          $ref: '#/components/responses/AuthUnauthorized'
        '403':
          $ref: '#/components/responses/RoleForbidden'
        '500':
          $ref: '#/components/responses/CreateProfessionalInternalServerError'

  /professionals/{id}:
    get:
      summary: Get professional by ID
      parameters:
        - $ref: '#/components/parameters/ResourceID'
      responses:
        '200':
          description: Professional found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Professional'
              examples:
                professional:
                  value:
                    id: pro-1
                    first_name: Ana
                    last_name: Lopez
                    specialty: cardiology
                    active: true
                    created_at: '2026-04-06T12:00:00Z'
                    updated_at: '2026-04-06T12:00:00Z'
        '404':
          $ref: '#/components/responses/ProfessionalNotFound'
        '500':
          $ref: '#/components/responses/GetProfessionalInternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    CreatePatientBadRequest:
      description: Invalid JSON body or patient validation failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_json_body:
              value:
                error: invalid json body
            failed_to_create_patient:
              value:
                error: failed to create patient
    CreatePatientInternalServerError:
      description: Unexpected failure while creating the patient.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            failed_to_create_patient:
              value:
                error: failed to create patient
    PatientNotFound:
      description: Patient not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            patient_not_found:
              value:
                error: patient not found
    GetPatientInternalServerError:
      description: Unexpected failure while loading the patient.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            failed_to_load_patient:
              value:
                error: failed to load patient
    CreateProfessionalBadRequest:
      description: Invalid JSON body or professional validation failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_json_body:
              value:
                error: invalid json body
            failed_to_create_professional:
              value:
                error: failed to create professional
    CreateProfessionalInternalServerError:
      description: Unexpected failure while creating the professional.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            failed_to_create_professional:
              value:
                error: failed to create professional
    ProfessionalNotFound:
      description: Professional not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            professional_not_found:
              value:
                error: professional not found
    GetProfessionalInternalServerError:
      description: Unexpected failure while loading the professional.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            failed_to_load_professional:
              value:
                error: failed to load professional
    AuthBadRequest:
      description: Invalid JSON body or missing credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_json_body:
              value:
                error: invalid json body
            missing_credentials:
              value:
                error: email and password are required
    AuthUnauthorized:
      description: Invalid credentials or missing/invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                error: unauthorized
    AuthInternalServerError:
      description: Unexpected failure while creating the auth session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            failed_to_authenticate:
              value:
                error: failed to authenticate user
            failed_to_create_session:
              value:
                error: failed to create session
    AuthMeInternalServerError:
      description: Unexpected failure while loading the authenticated user.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            failed_to_load_current_user:
              value:
                error: failed to load current user
    ClinicalForbidden:
      description: Authenticated user lacks the doctor role or professional profile required by clinical endpoints.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            doctor_role_required:
              value:
                error: doctor role required
            professional_profile_required:
              value:
                error: professional profile required
    RoleForbidden:
      description: Authenticated user does not have one of the allowed roles for the endpoint.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            insufficient_role:
              value:
                error: insufficient role
    CreateEncounterBadRequest:
      description: Invalid JSON body or encounter validation failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_json_body:
              value:
                error: invalid json body
            failed_to_create_encounter:
              value:
                error: failed to create encounter
    CreateEncounterInternalServerError:
      description: Unexpected failure while creating the encounter.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            failed_to_create_encounter:
              value:
                error: failed to create encounter
    ListEncountersInternalServerError:
      description: Unexpected failure while listing encounters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            failed_to_list_encounters:
              value:
                error: failed to list encounters
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
      example:
        error: invalid json body

    HealthResponse:
      type: object
      required:
        - status
        - service
        - time
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: directory-service
        time:
          type: string
          format: date-time

    InfoResponse:
      type: object
      required:
        - service
        - version
        - environment
      properties:
        service:
          type: string
          example: directory-service
        version:
          type: string
          example: 0.1.0
        environment:
          type: string
          example: development

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthUser:
      type: object
      required:
        - id
        - email
        - role
        - active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          example: admin
        professional_id:
          type: string
          format: uuid
          nullable: true
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LoginResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_at
        - user
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/AuthUser'

    CreatePatientRequest:
      type: object
      required:
        - first_name
        - last_name
        - document
        - birth_date
        - phone
      properties:
        first_name:
          type: string
          minLength: 1
        last_name:
          type: string
          minLength: 1
        document:
          type: string
          minLength: 1
        birth_date:
          type: string
          format: date
        phone:
          type: string
          minLength: 1
        email:
          type: string
          format: email

    Patient:
      type: object
      required:
        - id
        - first_name
        - last_name
        - document
        - birth_date
        - phone
        - active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        document:
          type: string
        birth_date:
          type: string
          format: date
        phone:
          type: string
        email:
          type: string
          format: email
          nullable: true
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PatientListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Patient'

    CreateEncounterRequest:
      type: object
      required:
        - note
      properties:
        occurred_at:
          type: string
          format: date-time
        note:
          type: string
          minLength: 1

    ClinicalNote:
      type: object
      required:
        - id
        - encounter_id
        - chart_id
        - patient_id
        - professional_id
        - kind
        - content
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        encounter_id:
          type: string
          format: uuid
        chart_id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        professional_id:
          type: string
          format: uuid
        kind:
          type: string
          example: initial
        content:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Encounter:
      type: object
      required:
        - id
        - chart_id
        - patient_id
        - professional_id
        - occurred_at
        - created_at
        - updated_at
        - initial_note
      properties:
        id:
          type: string
          format: uuid
        chart_id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        professional_id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        initial_note:
          $ref: '#/components/schemas/ClinicalNote'

    EncounterListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Encounter'

    CreateProfessionalRequest:
      type: object
      required:
        - first_name
        - last_name
        - specialty
      properties:
        first_name:
          type: string
        last_name:
          type: string
        specialty:
          type: string

    Professional:
      type: object
      required:
        - id
        - first_name
        - last_name
        - specialty
        - active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
          minLength: 1
        last_name:
          type: string
          minLength: 1
        specialty:
          type: string
          minLength: 1
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProfessionalListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Professional'
