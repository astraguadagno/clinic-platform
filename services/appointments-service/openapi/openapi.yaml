openapi: 3.0.3
info:
  title: Appointments Service API
  version: 0.1.0
  description: API for managing professional availability and appointments.

servers:
  - url: http://localhost:8082

paths:
  /health:
    get:
      summary: Service health check
      responses:
        '200':
          description: Healthy service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /info:
    get:
      summary: Service metadata
      responses:
        '200':
          description: Service info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfoResponse'

  /slots:
    get:
      summary: List slots
      parameters:
        - $ref: '#/components/parameters/ProfessionalIDFilter'
        - $ref: '#/components/parameters/StatusFilter'
        - $ref: '#/components/parameters/DateFilter'
      responses:
        '200':
          description: Slots listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotListResponse'
        '400':
          description: Invalid slot filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_slot_filters:
                  value:
                    error: invalid slot filters
        '500':
          description: Unexpected failure while listing slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                failed_to_list_slots:
                  value:
                    error: failed to list slots

  /slots/bulk:
    post:
      summary: Create slots in bulk for a professional
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateSlotsRequest'
      responses:
        '201':
          description: Slots created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotListResponse'
        '400':
          description: Invalid JSON body, validation failure, or missing professional reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_json_body:
                  value:
                    error: invalid json body
                invalid_slot_bulk_request:
                  value:
                    error: invalid slot bulk request
                professional_not_found:
                  value:
                    error: professional not found
        '409':
          description: Slot range conflicts with existing slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                slot_conflict:
                  value:
                    error: slot range conflicts with existing slots
        '503':
          description: Directory service unavailable while validating external references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                directory_service_unavailable:
                  value:
                    error: directory service unavailable
        '500':
          description: Unexpected failure while creating slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                failed_to_create_slots:
                  value:
                    error: failed to create slots

  /schedules:
    get:
      summary: Get active schedule for a professional and effective date
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProfessionalIDFilter'
        - $ref: '#/components/parameters/EffectiveDateFilter'
      responses:
        '200':
          description: Active schedule loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleTemplate'
        '400':
          description: Invalid schedule filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_schedule_filters:
                  value:
                    error: invalid schedule filters
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  value:
                    error: unauthorized
        '403':
          description: Authenticated actor cannot access the requested professional scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden_professional_scope:
                  value:
                    error: forbidden professional scope
        '404':
          description: Schedule not found for the requested effective date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                schedule_not_found:
                  value:
                    error: schedule not found
        '500':
          description: Unexpected failure while loading the schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                failed_to_load_schedule:
                  value:
                    error: failed to load schedule
    post:
      summary: Create or replace a schedule template version
      description: Creates a new effective-dated schedule version. If the same professional already has a version for the requested `effective_from`, the existing version is replaced as a correction instead of returning a duplicate-date conflict.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
      responses:
        '201':
          description: Schedule created or same-date version replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleTemplate'
        '400':
          description: Invalid JSON body, invalid request payload, or missing professional reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_json_body:
                  value:
                    error: invalid json body
                invalid_schedule_request:
                  value:
                    error: invalid schedule request
                professional_not_found:
                  value:
                    error: professional not found
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  value:
                    error: unauthorized
        '403':
          description: Authenticated actor cannot create this schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficient_role:
                  value:
                    error: insufficient role
                forbidden_professional_scope:
                  value:
                    error: forbidden professional scope
        '503':
          description: Directory service unavailable while validating professional references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                directory_service_unavailable:
                  value:
                    error: directory service unavailable
        '500':
          description: Unexpected failure while creating the schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                failed_to_create_schedule:
                  value:
                    error: failed to create schedule

  /schedules/versions:
    get:
      summary: List all versions for a schedule template
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateIDFilter'
      responses:
        '200':
          description: Schedule versions listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleTemplateVersionListResponse'
        '400':
          description: Invalid schedule filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_schedule_filters:
                  value:
                    error: invalid schedule filters
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  value:
                    error: unauthorized
        '403':
          description: Authenticated actor cannot access the requested professional scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden_professional_scope:
                  value:
                    error: forbidden professional scope
        '404':
          description: Schedule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                schedule_not_found:
                  value:
                    error: schedule not found
        '500':
          description: Unexpected failure while loading schedule versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                failed_to_load_schedule_versions:
                  value:
                    error: failed to load schedule versions

  /blocks:
